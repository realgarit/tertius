name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    # macOS 26 SDK is required for the .macOS(.v26) deployment target.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Toolchain info
        run: |
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
